services:
  mongo:
    image: mongo:7
    container_name: diyet_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: diyet
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - diyet_network

  backend:
    build: ./backend
    container_name: diyet_backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - mongo
    networks:
      - diyet_network
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: diyet_frontend
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
    depends_on:
      - backend
    networks:
      - diyet_network
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: diyet_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - diyet_network

volumes:
  mongo_data:

networks:
  diyet_network:
    driver: bridge
