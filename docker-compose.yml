services:
  mongo:
    image: mongo:7
    container_name: diyet_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: diyet
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - diyet_network

  backend:
    build: ./backend
    container_name: diyet_backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - mongo
    networks:
      - diyet_network
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: diyet_frontend
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      BACKEND_URL: "http://backend:5000"
    depends_on:
      - backend
    networks:
      - diyet_network
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: diyet_caddy
    restart: unless-stopped
    environment:
      CADDY_HOST: ${CADDY_HOST:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - diyet_network

volumes:
  mongo_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  diyet_network:
    driver: bridge
